<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScieMon — Science Battle</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #1a1a2e;
  --grass: #2d5a27;
  --grass2: #1e3d1a;
  --sky: #4a9eff;
  --panel: #f0e8d0;
  --panel-dark: #c8b89a;
  --panel-border: #3a2a1a;
  --text-dark: #1a1a1a;
  --text-panel: #2a1a0a;
  --hp-green: #58d858;
  --hp-yellow: #f8c800;
  --hp-red: #f83800;
  --accent: #e83030;
  --white: #f8f8f8;
}
* { box-sizing: border-box; margin: 0; padding: 0; image-rendering: pixelated; }
body {
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Press Start 2P', monospace;
  padding: 1rem;
}

#game {
  width: 100%;
  max-width: 480px;
  position: relative;
}

/* ===== SCREENS ===== */
.screen { display: none; }
.screen.active { display: block; }

/* ===== TITLE ===== */
#title-screen {
  background: #e8f0f8;
  border: 4px solid var(--panel-border);
  text-align: center;
  padding: 2rem 1.5rem;
}
.game-title {
  font-size: clamp(1rem, 5vw, 1.5rem);
  color: var(--accent);
  text-shadow: 3px 3px 0 #800000;
  line-height: 1.6;
  margin-bottom: 0.3rem;
}
.game-subtitle {
  font-size: 0.45rem;
  color: #555;
  margin-bottom: 1.5rem;
  letter-spacing: 1px;
}
.starter-label {
  font-size: 0.5rem;
  color: var(--text-dark);
  margin-bottom: 1rem;
}
.starters {
  display: flex;
  gap: 0.8rem;
  justify-content: center;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
}
.starter-card {
  background: white;
  border: 3px solid #ccc;
  padding: 0.8rem 0.6rem;
  cursor: pointer;
  width: 110px;
  transition: all 0.1s;
}
.starter-card:hover, .starter-card.selected {
  border-color: var(--accent);
  transform: translateY(-4px);
  box-shadow: 0 6px 0 #800000;
}
.starter-sprite { font-size: 2.8rem; display: block; margin-bottom: 0.4rem; }
.starter-name { font-size: 0.45rem; color: var(--accent); display: block; margin-bottom: 0.3rem; }
.starter-type { font-size: 0.38rem; color: #777; display: block; }

.name-row { margin-bottom: 1.2rem; }
.name-row label { font-size: 0.45rem; color: #333; display: block; margin-bottom: 0.5rem; }
.poke-input {
  font-family: 'Press Start 2P', monospace;
  font-size: 0.6rem;
  padding: 0.5rem 0.8rem;
  border: 3px solid var(--panel-border);
  background: white;
  color: var(--text-dark);
  width: 100%;
  max-width: 220px;
  outline: none;
  text-align: center;
}
.poke-input:focus { border-color: var(--accent); }

.poke-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 0.55rem;
  padding: 0.7rem 1.4rem;
  border: 3px solid var(--panel-border);
  cursor: pointer;
  transition: all 0.1s;
  text-transform: uppercase;
}
.poke-btn-red { background: var(--accent); color: white; box-shadow: 3px 3px 0 #800000; }
.poke-btn-red:hover { transform: translate(2px,2px); box-shadow: 1px 1px 0 #800000; }
.poke-btn-white { background: white; color: var(--text-dark); box-shadow: 3px 3px 0 #888; }
.poke-btn-white:hover { transform: translate(2px,2px); box-shadow: 1px 1px 0 #888; }

/* ===== OVERWORLD ===== */
#map-screen {
  background: #e8f8e0;
  border: 4px solid var(--panel-border);
}
.map-header {
  background: var(--accent);
  padding: 0.6rem 1rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.map-header-title { font-size: 0.5rem; color: white; }
.map-trainer-info { font-size: 0.4rem; color: #ffcccc; }
.map-body { padding: 1rem; }
.map-title-text { font-size: 0.55rem; color: var(--text-dark); margin-bottom: 1rem; text-align: center; }
.map-grid { display: flex; flex-direction: column; gap: 0.6rem; }
.map-route {
  background: white;
  border: 3px solid #aaa;
  padding: 0.8rem 1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 0.8rem;
  transition: all 0.1s;
  position: relative;
}
.map-route:hover:not(.locked) { border-color: var(--accent); transform: translateX(3px); }
.map-route.locked { opacity: 0.5; cursor: not-allowed; background: #eee; }
.map-route.cleared { border-color: var(--hp-green); background: #f0fff0; }
.route-icon { font-size: 2rem; flex-shrink: 0; }
.route-info { flex: 1; }
.route-name { font-size: 0.5rem; color: var(--text-dark); margin-bottom: 0.3rem; }
.route-sub { font-size: 0.38rem; color: #777; }
.route-badge { font-size: 1.2rem; }

/* ===== BATTLE SCREEN ===== */
#battle-screen {
  background: #48a0e8;
  border: 4px solid var(--panel-border);
  overflow: hidden;
}

.battle-field {
  position: relative;
  height: 200px;
  background: linear-gradient(180deg, #48a0e8 0%, #48a0e8 55%, #60c840 55%, #60c840 70%, #48b840 70%, #48b840 100%);
  overflow: hidden;
}

/* Ground platforms */
.battle-field::before {
  content: '';
  position: absolute;
  bottom: 30%;
  left: 5%;
  width: 38%;
  height: 18px;
  background: #78d850;
  border-radius: 50%;
  box-shadow: 0 4px 0 #50a030;
}
.battle-field::after {
  content: '';
  position: absolute;
  bottom: 42%;
  right: 5%;
  width: 38%;
  height: 14px;
  background: #90e868;
  border-radius: 50%;
  box-shadow: 0 3px 0 #60b840;
}

/* Enemy side */
.enemy-platform {
  position: absolute;
  top: 18px;
  right: 8%;
  text-align: center;
}
.enemy-sprite-wrap {
  font-size: 5rem;
  line-height: 1;
  display: block;
  transition: transform 0.15s;
  filter: drop-shadow(2px 4px 0 rgba(0,0,0,0.3));
}
.enemy-sprite-wrap.shake {
  animation: shake 0.4s ease;
}
.enemy-sprite-wrap.faint {
  animation: faint 0.6s ease forwards;
}
@keyframes shake {
  0%,100%{transform:translateX(0);}
  20%{transform:translateX(-8px);}
  40%{transform:translateX(8px);}
  60%{transform:translateX(-6px);}
  80%{transform:translateX(6px);}
}
@keyframes faint {
  0%{transform:translateY(0);opacity:1;}
  100%{transform:translateY(60px);opacity:0;}
}

/* Player side */
.player-platform {
  position: absolute;
  bottom: 28%;
  left: 5%;
  text-align: center;
}
.player-sprite-wrap {
  font-size: 4rem;
  line-height: 1;
  display: block;
  filter: drop-shadow(2px 4px 0 rgba(0,0,0,0.3));
  animation: playerBob 1s ease-in-out infinite;
}
@keyframes playerBob {
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-4px);}
}
.player-sprite-wrap.attack {
  animation: playerAttack 0.5s ease;
}
@keyframes playerAttack {
  0%{transform:translateX(0);}
  30%{transform:translateX(30px);}
  100%{transform:translateX(0);}
}

/* HP boxes */
.enemy-hpbox {
  position: absolute;
  top: 12px;
  left: 8px;
  background: var(--panel);
  border: 3px solid var(--panel-border);
  padding: 0.4rem 0.6rem;
  min-width: 160px;
  box-shadow: 3px 3px 0 #888;
}
.player-hpbox {
  position: absolute;
  bottom: 10px;
  right: 8px;
  background: var(--panel);
  border: 3px solid var(--panel-border);
  padding: 0.4rem 0.6rem;
  min-width: 160px;
  box-shadow: 3px 3px 0 #888;
}
.hpbox-name { font-size: 0.45rem; color: var(--text-dark); margin-bottom: 4px; display: flex; justify-content: space-between; }
.hpbox-lv { font-size: 0.35rem; color: #555; }
.hp-bar-track {
  height: 8px;
  background: #888;
  border: 1px solid #555;
  margin-bottom: 2px;
}
.hp-bar-fill {
  height: 100%;
  transition: width 0.5s, background 0.5s;
}
.hp-bar-fill.green { background: var(--hp-green); }
.hp-bar-fill.yellow { background: var(--hp-yellow); }
.hp-bar-fill.red { background: var(--hp-red); }
.hpbox-nums { font-size: 0.38rem; color: var(--text-dark); text-align: right; }

/* DIALOGUE / BATTLE PANEL */
.battle-panel {
  background: var(--panel);
  border-top: 4px solid var(--panel-border);
  min-height: 140px;
  position: relative;
}

.dialogue-box {
  padding: 0.8rem 1rem;
  min-height: 90px;
  display: flex;
  align-items: flex-start;
}
.dialogue-text {
  font-size: 0.55rem;
  color: var(--text-panel);
  line-height: 2;
  max-width: 100%;
}
.dialogue-cursor {
  display: inline-block;
  width: 10px;
  height: 10px;
  background: var(--text-panel);
  margin-left: 4px;
  animation: blink 0.6s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }

/* MOVE MENU */
.move-menu {
  display: none;
  padding: 0.5rem;
  border-top: 3px solid var(--panel-border);
}
.move-menu.show { display: block; }
.move-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.4rem;
  margin-bottom: 0.5rem;
}
.move-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 0.42rem;
  padding: 0.5rem 0.4rem;
  border: 2px solid var(--panel-border);
  background: white;
  color: var(--text-dark);
  cursor: pointer;
  text-align: left;
  transition: all 0.1s;
  line-height: 1.6;
}
.move-btn:hover { background: #ffe0e0; border-color: var(--accent); }
.move-type {
  display: block;
  font-size: 0.35rem;
  color: white;
  padding: 1px 4px;
  border-radius: 2px;
  margin-top: 3px;
}
.type-attack { background: #f08030; }
.type-special { background: #6890f0; }
.type-defend { background: #78c850; }
.type-hint { background: #a040a0; }

.battle-menu-actions {
  display: flex;
  gap: 0.4rem;
  padding: 0 0.5rem 0.5rem;
}

/* QUESTION overlay */
.question-overlay {
  display: none;
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 10;
  padding: 0.8rem;
  flex-direction: column;
}
.question-overlay.show { display: flex; }
.q-box {
  background: var(--panel);
  border: 3px solid var(--panel-border);
  padding: 0.8rem;
  margin-bottom: 0.5rem;
  flex-shrink: 0;
}
.q-label { font-size: 0.38rem; color: #888; margin-bottom: 0.4rem; }
.q-text { font-size: 0.5rem; color: var(--text-dark); line-height: 1.8; }
.q-options { display: flex; flex-direction: column; gap: 0.4rem; flex: 1; overflow-y: auto; }
.q-opt {
  font-family: 'Press Start 2P', monospace;
  font-size: 0.45rem;
  padding: 0.6rem 0.8rem;
  border: 2px solid var(--panel-border);
  background: white;
  color: var(--text-dark);
  cursor: pointer;
  text-align: left;
  line-height: 1.6;
  transition: all 0.1s;
}
.q-opt:hover:not(:disabled) { background: #fff0e0; border-color: var(--accent); }
.q-opt.correct { background: #d0ffd0; border-color: var(--hp-green); color: #006000; }
.q-opt.wrong { background: #ffd0d0; border-color: var(--hp-red); color: #800000; }
.q-opt:disabled { cursor: default; }

/* DAMAGE NUMBER */
.dmg-num {
  position: absolute;
  font-family: 'Press Start 2P', monospace;
  font-size: 1.2rem;
  color: white;
  text-shadow: 2px 2px 0 #000;
  pointer-events: none;
  animation: dmgFloat 0.8s ease forwards;
  z-index: 5;
}
@keyframes dmgFloat {
  0%{transform:translateY(0);opacity:1;}
  100%{transform:translateY(-40px);opacity:0;}
}

/* CATCH animation */
.pokeball-throw {
  position: absolute;
  font-size: 1.5rem;
  animation: throwBall 0.6s ease forwards;
  z-index: 6;
}
@keyframes throwBall {
  0%{left:20%;bottom:40%;opacity:1;}
  100%{right:20%;top:20%;opacity:0;}
}

/* WIN/LOSE overlay */
.result-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  z-index: 100;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  text-align: center;
  padding: 2rem;
}
.result-overlay.show { display: flex; }
.result-icon { font-size: 4rem; margin-bottom: 1rem; }
.result-title { font-size: clamp(0.8rem,3vw,1.2rem); margin-bottom: 1rem; }
.result-title.win { color: var(--hp-green); text-shadow: 0 0 20px var(--hp-green); }
.result-title.lose { color: var(--hp-red); text-shadow: 0 0 20px var(--hp-red); }
.result-detail { font-size: 0.45rem; color: #ccc; line-height: 2.2; margin-bottom: 1.5rem; }

/* BADGE notification */
.badge-notif {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  background: var(--panel);
  border: 4px solid gold;
  padding: 1.5rem 2rem;
  text-align: center;
  z-index: 99;
  box-shadow: 0 0 40px gold;
  animation: badgePop 0.4s ease;
  display: none;
}
.badge-notif.show { display: block; }
@keyframes badgePop { 0%{transform:translate(-50%,-50%) scale(0);} 100%{transform:translate(-50%,-50%) scale(1);} }
.badge-notif-icon { font-size: 3rem; display: block; margin-bottom: 0.5rem; }
.badge-notif-text { font-size: 0.5rem; color: var(--text-dark); line-height: 1.8; }
</style>
</head>
<body>
<div id="game">

<!-- TITLE -->
<div id="title-screen" class="screen active">
  <div class="game-title">⚗️ SCIEMON</div>
  <div class="game-subtitle">SCIENCE BATTLES — MIDTERM EDITION</div>
  <div style="font-size:3rem;margin:0.5rem 0;animation:playerBob 1.5s ease-in-out infinite">🧑‍🔬</div>
  <div class="starter-label">CHOOSE YOUR SCIEMON:</div>
  <div class="starters">
    <div class="starter-card" onclick="pickStarter('newton')" id="s-newton">
      <span class="starter-sprite">🍎</span>
      <span class="starter-name">NEWTON</span>
      <span class="starter-type">Forces Type</span>
    </div>
    <div class="starter-card" onclick="pickStarter('quanta')" id="s-quanta">
      <span class="starter-sprite">⚡</span>
      <span class="starter-name">QUANTA</span>
      <span class="starter-type">Energy Type</span>
    </div>
    <div class="starter-card" onclick="pickStarter('velo')" id="s-velo">
      <span class="starter-sprite">💨</span>
      <span class="starter-name">VELO</span>
      <span class="starter-type">Motion Type</span>
    </div>
  </div>
  <div class="name-row">
    <label>YOUR NAME:</label>
    <input class="poke-input" id="trainer-name" type="text" maxlength="10" placeholder="TRAINER">
  </div>
  <button class="poke-btn poke-btn-red" onclick="beginGame()">▶ NEW GAME</button>
</div>

<!-- MAP -->
<div id="map-screen" class="screen">
  <div class="map-header">
    <div class="map-header-title" id="map-trainer-name">TRAINER</div>
    <div class="map-trainer-info" id="map-badges">Badges: 0/4</div>
  </div>
  <div class="map-body">
    <div class="map-title-text">— SELECT A ROUTE —</div>
    <div class="map-grid" id="map-grid"></div>
  </div>
</div>

<!-- BATTLE -->
<div id="battle-screen" class="screen">
  <!-- Field -->
  <div class="battle-field" id="battle-field">
    <!-- Enemy HP -->
    <div class="enemy-hpbox">
      <div class="hpbox-name"><span id="enemy-name">???</span><span class="hpbox-lv" id="enemy-lv">Lv5</span></div>
      <div class="hp-bar-track"><div class="hp-bar-fill green" id="enemy-hp-fill" style="width:100%"></div></div>
    </div>
    <!-- Enemy sprite -->
    <div class="enemy-platform">
      <span class="enemy-sprite-wrap" id="enemy-sprite">👾</span>
    </div>
    <!-- Player sprite -->
    <div class="player-platform">
      <span class="player-sprite-wrap" id="player-sprite">🧑‍🔬</span>
    </div>
    <!-- Player HP -->
    <div class="player-hpbox">
      <div class="hpbox-name"><span id="player-mon-name">NEWTON</span><span class="hpbox-lv" id="player-lv">Lv1</span></div>
      <div class="hp-bar-track"><div class="hp-bar-fill green" id="player-hp-fill" style="width:100%"></div></div>
      <div class="hpbox-nums"><span id="player-hp-nums">20/20</span></div>
    </div>
  </div>

  <!-- Battle panel -->
  <div class="battle-panel">
    <div class="dialogue-box" id="dialogue-box">
      <div class="dialogue-text" id="dialogue-text">A wild concept appears!</div>
    </div>
    <!-- Move menu -->
    <div class="move-menu" id="move-menu">
      <div class="move-grid">
        <button class="move-btn" onclick="useMove('attack')">⚔ ANSWER<span class="move-type type-attack">NORMAL</span></button>
        <button class="move-btn" onclick="useMove('power')">💥 POWER SHOT<span class="move-type type-special">SPECIAL</span></button>
        <button class="move-btn" onclick="useMove('hint')" id="hint-move">💡 HINT<span class="move-type type-hint">SUPPORT</span></button>
        <button class="move-btn" onclick="useMove('run')">🏃 RUN<span class="move-type type-defend">FLEE</span></button>
      </div>
    </div>
  </div>

  <!-- Question overlay -->
  <div class="question-overlay" id="q-overlay">
    <div class="q-box">
      <div class="q-label" id="q-label">WHAT WILL YOU DO?</div>
      <div class="q-text" id="q-text">Loading...</div>
    </div>
    <div class="q-options" id="q-options"></div>
  </div>
</div>

<!-- Result overlay -->
<div class="result-overlay" id="result-overlay">
  <div class="result-icon" id="result-icon">🏆</div>
  <div class="result-title" id="result-title">YOU WIN!</div>
  <div class="result-detail" id="result-detail"></div>
  <button class="poke-btn poke-btn-red" onclick="resetGame()">▶ PLAY AGAIN</button>
</div>

<!-- Badge popup -->
<div class="badge-notif" id="badge-notif">
  <span class="badge-notif-icon" id="badge-icon">🏅</span>
  <div class="badge-notif-text" id="badge-text">You received a badge!</div>
</div>

<script>
// ============ DATA ============
const starterSprites = { newton:'🍎', quanta:'⚡', velo:'💨' };
const starterNames = { newton:'NEWTON', quanta:'QUANTA', velo:'VELO' };

const routes = [
  {
    id:0, name:'ROUTE 1 — LAB RUINS', sub:'Ch.1: Science Skills',
    badge:'🔬', badgeName:'Lab Badge', icon:'🏚️', locked:false,
    wild:[
      {name:'VARI-BORG', sprite:'🤖', hp:20, lv:5, weak:'variables', taunt:'Which variable am I?!'},
      {name:'SIGFIGULA', sprite:'🧛', hp:18, lv:4, weak:'sig figs', taunt:'Your sig figs are WRONG!'},
      {name:'THEORYZARD', sprite:'🐉', hp:22, lv:6, weak:'theory vs law', taunt:'Theory or Law?! CHOOSE!'},
      {name:'GRAPH HAUNTER', sprite:'👻', hp:16, lv:5, weak:'graphs', taunt:'x-axis or y-axis?!'},
    ],
    questions:[
      {q:'Which variable does the scientist deliberately change?', opts:['Dependent variable','Controlled variable','Independent variable','Responding variable'], ans:2, hint:'It\'s what YOU change on purpose.'},
      {q:'A scientific THEORY is:', opts:['A lucky guess','A single test result','A well-tested explanation backed by evidence','The same as a law'], ans:2, hint:'Theories EXPLAIN patterns. Laws just describe them.'},
      {q:'What is the control group?', opts:['The group receiving treatment','The group with all variables changed','The baseline group with no treatment','The dependent variable'], ans:2, hint:'It\'s what you COMPARE everything else against.'},
      {q:'Precision means:', opts:['Close to true value','Consistent, repeatable results','Using the right formula','Having few measurements'], ans:1, hint:'Precision = repeatability. Accuracy = closeness to truth. Different things!'},
      {q:'Percent Error = ?', opts:['calculated ÷ accepted × 100%','|accepted − calculated| ÷ accepted × 100%','(accepted + calculated) ÷ 2','calculated − accepted'], ans:1, hint:'Absolute difference ÷ accepted value × 100%.'},
      {q:'Independent variable goes on which axis?', opts:['y-axis','Both axes','x-axis','z-axis'], ans:2, hint:'DRY MIX: Dependent=Y, Independent=X'},
      {q:'A direct proportion graph looks like:', opts:['A curved line','A horizontal line','A straight diagonal line','A zigzag'], ans:2, hint:'Direct proportion = constant ratio = straight line.'},
      {q:'How many significant figures in 0.00420?', opts:['6','5','3','2'], ans:2, hint:'Leading zeros don\'t count. 4, 2, and trailing 0 after decimal = 3 sig figs.'},
      {q:'A scientific LAW:', opts:['Explains WHY something happens','Describes a pattern without explaining it','Is less reliable than a theory','Is always 100% proven'], ans:1, hint:'Laws DESCRIBE. Theories EXPLAIN.'},
      {q:'When multiplying measurements, round to:', opts:['Most decimal places','Fewest significant figures','Least precise place','Always 3 sig figs'], ans:1, hint:'Multiply/Divide → fewest sig figs in your data.'},
    ]
  },
  {
    id:1, name:'ROUTE 2 — VELOCITY VALE', sub:'Ch.2: Motion',
    badge:'💨', badgeName:'Motion Badge', icon:'🌪️', locked:true,
    wild:[
      {name:'VELOCIRAPTOR', sprite:'🦖', hp:24, lv:8, weak:'velocity', taunt:'Speed or velocity?! RAWR!'},

// ============ STATE ============
let trainer = { name:'TRAINER', starter:'newton', badges:0, level:1 };
let battle = {
  route: null,
  enemyIdx: 0,
  enemy: null,
  enemyHp: 0,
  playerHp: 20,
  playerMaxHp: 20,
  hints: 3,
  qUsed: {},
  currentQ: null,
  moveType: 'attack',
  canAct: true,
};

// ============ INIT ============
function pickStarter(s) {
  trainer.starter = s;
  document.querySelectorAll('.starter-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById('s-'+s).classList.add('selected');
}

function beginGame() {
  trainer.name = (document.getElementById('trainer-name').value.trim() || 'TRAINER').toUpperCase().substring(0,10);
  trainer.badges = 0;
  trainer.level = 1;
  battle.playerMaxHp = 20;
  battle.playerHp = 20;
  battle.hints = 3;
  renderMap();
  show('map-screen');
}

function show(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function renderMap() {
  document.getElementById('map-trainer-name').textContent = trainer.name;
  document.getElementById('map-badges').textContent = `Badges: ${trainer.badges}/4`;
  const grid = document.getElementById('map-grid');
  grid.innerHTML = '';
  routes.forEach((r,i) => {
    const div = document.createElement('div');
    const cleared = trainer.badges > i;
    const locked = r.locked && trainer.badges < i;
    div.className = `map-route${locked?' locked':''}${cleared?' cleared':''}`;
    div.innerHTML = `
      <div class="route-icon">${r.icon}</div>
      <div class="route-info">
        <div class="route-name">${r.name}</div>
        <div class="route-sub">${r.sub}</div>
      </div>
      <div class="route-badge">${cleared ? r.badge+'✓' : locked ? '🔒' : '▶'}</div>`;
    if(!locked && !cleared) div.onclick = ()=>enterBattle(i);
    grid.appendChild(div);
  });
}

// ============ BATTLE ============
function enterBattle(routeIdx) {
  const route = routes[routeIdx];
  battle.route = routeIdx;
  battle.enemyIdx = 0;
  battle.qUsed[routeIdx] = battle.qUsed[routeIdx] || [];
  battle.canAct = true;

  document.getElementById('player-sprite').textContent = starterSprites[trainer.starter];
  document.getElementById('player-mon-name').textContent = starterNames[trainer.starter];
  document.getElementById('player-lv').textContent = 'Lv'+trainer.level;
  updatePlayerHpBar();

  show('battle-screen');
  loadEnemy();
}

function loadEnemy() {
  const route = routes[battle.route];
  const e = route.wild[battle.enemyIdx];
  battle.enemy = e;
  battle.enemyHp = e.hp;
  battle.canAct = true;

  document.getElementById('enemy-sprite').textContent = e.sprite;
  document.getElementById('enemy-sprite').className = 'enemy-sprite-wrap';
  document.getElementById('enemy-name').textContent = e.name;
  document.getElementById('enemy-lv').textContent = 'Lv'+e.lv;
  updateEnemyHpBar();

  document.getElementById('move-menu').classList.remove('show');
  document.getElementById('q-overlay').classList.remove('show');

  typeDialogue(`A wild ${e.name} appeared!`, ()=>{
    typeDialogue(e.taunt, ()=>{
      typeDialogue(`What will ${starterNames[trainer.starter]} do?`, ()=>{
        document.getElementById('move-menu').classList.add('show');
      });
    });
  });
}

function useMove(type) {
  if(!battle.canAct) return;
  battle.moveType = type;
  document.getElementById('move-menu').classList.remove('show');

  if(type === 'run') {
    typeDialogue('You fled from battle!', ()=>{
      renderMap();
      show('map-screen');
    });
    return;
  }
  if(type === 'hint') {
    if(battle.hints <= 0) {
      typeDialogue('No hints remaining!', ()=>{
        document.getElementById('move-menu').classList.add('show');
      });
      return;
    }
    battle.hints--;
    // load q with hint shown
    const q = getQuestion(battle.route);
    battle.currentQ = q;
    showQuestion(q, true);
    return;
  }
  // attack or power shot
  const q = getQuestion(battle.route);
  battle.currentQ = q;
  showQuestion(q, false);
}

function getQuestion(routeIdx) {
  const qs = routes[routeIdx].questions;
  const used = battle.qUsed[routeIdx] || [];
  let avail = qs.map((_,i)=>i).filter(i=>!used.includes(i));
  if(avail.length===0){ battle.qUsed[routeIdx]=[]; avail=qs.map((_,i)=>i); }
  const idx = avail[Math.floor(Math.random()*avail.length)];
  battle.qUsed[routeIdx].push(idx);
  return qs[idx];
}

function showQuestion(q, showHint) {
  const overlay = document.getElementById('q-overlay');
  overlay.classList.add('show');
  document.getElementById('q-label').textContent = showHint ? `💡 HINT: ${q.hint}` : '⚔ CHOOSE YOUR ANSWER:';
  document.getElementById('q-text').textContent = q.q;
  const opts = document.getElementById('q-options');
  opts.innerHTML = '';
  const letters = ['A','B','C','D'];
  q.opts.forEach((o,i)=>{
    const btn = document.createElement('button');
    btn.className = 'q-opt';
    btn.textContent = `${letters[i]}. ${o}`;
    btn.onclick = ()=>answerQ(i, btn);
    opts.appendChild(btn);
  });
}

function answerQ(chosen, btn) {
  const q = battle.currentQ;
  const correct = chosen === q.ans;
  document.querySelectorAll('.q-opt').forEach(b=>b.disabled=true);
  document.querySelectorAll('.q-opt')[q.ans].classList.add('correct');
  if(!correct) btn.classList.add('wrong');

  setTimeout(()=>{
    document.getElementById('q-overlay').classList.remove('show');
    if(correct) {
      correctAnswer();
    } else {
      wrongAnswer();
    }
  }, 1200);
}

function correctAnswer() {
  const isPower = battle.moveType === 'power';
  const dmg = isPower ? 8 : 5;

  // Player attacks
  document.getElementById('player-sprite').classList.add('attack');
  setTimeout(()=>document.getElementById('player-sprite').classList.remove('attack'), 500);

  // Show damage
  showDmgNum(dmg, true);
  battle.enemyHp = Math.max(0, battle.enemyHp - dmg);
  setTimeout(()=>{
    document.getElementById('enemy-sprite').classList.add('shake');
    setTimeout(()=>document.getElementById('enemy-sprite').classList.remove('shake'),400);
    updateEnemyHpBar();
  }, 300);

  const msg = isPower ? `💥 POWER SHOT! ${battle.enemy.name} takes ${dmg} damage!` : `✅ Correct! ${battle.enemy.name} takes ${dmg} damage!`;
  typeDialogue(msg, ()=>{
    if(battle.enemyHp <= 0) {
      enemyFaint();
    } else {
      // Enemy attacks back
      enemyAttack(()=>{
        if(battle.playerHp <= 0) { playerFaint(); return; }
        typeDialogue(`What will ${starterNames[trainer.starter]} do?`, ()=>{
          document.getElementById('move-menu').classList.add('show');
        });
      });
    }
  });
}

function wrongAnswer() {
  const dmg = 4 + Math.floor(Math.random()*4);
  battle.playerHp = Math.max(0, battle.playerHp - dmg);
  showDmgNum(dmg, false);
  updatePlayerHpBar();

  const field = document.getElementById('battle-field');
  field.style.animation = 'none';
  field.style.background = 'linear-gradient(180deg, #ff4444 0%, #ff4444 55%, #60c840 55%, #60c840 70%, #48b840 70%, #48b840 100%)';
  setTimeout(()=>{ field.style.background = ''; }, 400);

  typeDialogue(`❌ Wrong! ${battle.enemy.name} counters for ${dmg} damage!`, ()=>{
    if(battle.playerHp <= 0) { playerFaint(); return; }
    typeDialogue(`What will ${starterNames[trainer.starter]} do?`, ()=>{
      document.getElementById('move-menu').classList.add('show');
    });
  });
}

function enemyAttack(cb) {
  const dmg = 2 + Math.floor(Math.random()*3);
  battle.playerHp = Math.max(0, battle.playerHp - dmg);
  updatePlayerHpBar();
  typeDialogue(`${battle.enemy.name} attacks! ${starterNames[trainer.starter]} takes ${dmg} damage!`, cb);
}

function enemyFaint() {
  document.getElementById('enemy-sprite').classList.add('faint');
  typeDialogue(`${battle.enemy.name} fainted!`, ()=>{
    // XP / level up
    trainer.level = Math.min(100, trainer.level + 1);
    battle.playerMaxHp = 20 + trainer.level * 2;
    battle.playerHp = Math.min(battle.playerMaxHp, battle.playerHp + 5);
    battle.hints = Math.min(5, battle.hints + 1);
    updatePlayerHpBar();
    document.getElementById('player-lv').textContent = 'Lv'+trainer.level;

    typeDialogue(`${starterNames[trainer.starter]} gained experience! Lv ${trainer.level}!`, ()=>{
      battle.enemyIdx++;
      const route = routes[battle.route];
      if(battle.enemyIdx >= route.wild.length) {
        routeCleared();
      } else {
        setTimeout(loadEnemy, 600);
      }
    });
  });
}

function routeCleared() {
  trainer.badges++;
  // unlock next route
  if(battle.route + 1 < routes.length) routes[battle.route+1].locked = false;
  // heal
  battle.playerHp = battle.playerMaxHp;
  updatePlayerHpBar();

  typeDialogue(`You defeated all wild Sciemon on this route!`, ()=>{
    showBadge(routes[battle.route].badge, routes[battle.route].badgeName, ()=>{
      if(trainer.badges >= 4) {
        // WIN!
        document.getElementById('result-icon').textContent = '🏆';
        document.getElementById('result-title').className = 'result-title win';
        document.getElementById('result-title').textContent = 'YOU\'RE A CHAMPION!';
        document.getElementById('result-detail').innerHTML =
          `Trainer: ${trainer.name}<br>Badges: ${trainer.badges}/4<br>ScieMon: ${starterNames[trainer.starter]} Lv.${trainer.level}<br><br>You mastered all 4 chapters!<br>The midterm doesn't stand a chance. 🎓`;
        document.getElementById('result-overlay').classList.add('show');
      } else {
        renderMap();
        show('map-screen');
      }
    });
  });
}

function playerFaint() {
  document.getElementById('player-sprite').style.opacity = '0';
  typeDialogue(`${starterNames[trainer.starter]} fainted! You blacked out!`, ()=>{
    battle.playerHp = battle.playerMaxHp;
    updatePlayerHpBar();
    document.getElementById('player-sprite').style.opacity = '1';
    document.getElementById('result-icon').textContent = '💀';
    document.getElementById('result-title').className = 'result-title lose';
    document.getElementById('result-title').textContent = 'YOU BLACKED OUT!';
    document.getElementById('result-detail').innerHTML =
      `${starterNames[trainer.starter]} was defeated...<br>But knowledge respawns!<br><br>Try again, trainer ${trainer.name}!`;
    document.getElementById('result-overlay').classList.add('show');
  });
}

// ============ UI HELPERS ============
let dialogueTimeout = null;
function typeDialogue(text, cb) {
  clearTimeout(dialogueTimeout);
  const el = document.getElementById('dialogue-text');
  el.innerHTML = '';
  let i = 0;
  const cursor = document.createElement('span');
  cursor.className = 'dialogue-cursor';

  function type() {
    if(i < text.length) {
      el.textContent = text.substring(0,i+1);
      el.appendChild(cursor);
      i++;
      dialogueTimeout = setTimeout(type, 22);
    } else {
      if(cb) {
        dialogueTimeout = setTimeout(cb, 700);
      }
    }
  }
  type();
}

function updateEnemyHpBar() {
  const pct = Math.max(0,(battle.enemyHp / battle.enemy.hp)*100);
  const fill = document.getElementById('enemy-hp-fill');
  fill.style.width = pct+'%';
  fill.className = 'hp-bar-fill ' + (pct>50?'green':pct>20?'yellow':'red');
}

function updatePlayerHpBar() {
  const pct = Math.max(0,(battle.playerHp / battle.playerMaxHp)*100);
  const fill = document.getElementById('player-hp-fill');
  fill.style.width = pct+'%';
  fill.className = 'hp-bar-fill ' + (pct>50?'green':pct>20?'yellow':'red');
  document.getElementById('player-hp-nums').textContent = `${battle.playerHp}/${battle.playerMaxHp}`;
}

function showDmgNum(dmg, isEnemy) {
  const field = document.getElementById('battle-field');
  const el = document.createElement('div');
  el.className = 'dmg-num';
  el.textContent = '-'+dmg;
  el.style.color = isEnemy ? '#ff4444' : '#ff8800';
  el.style.left = isEnemy ? '60%' : '20%';
  el.style.top = isEnemy ? '20%' : '55%';
  field.appendChild(el);
  setTimeout(()=>el.remove(), 900);
}

function showBadge(icon, name, cb) {
  const notif = document.getElementById('badge-notif');
  document.getElementById('badge-icon').textContent = icon;
  document.getElementById('badge-text').textContent = `${name} obtained!\nBadges: ${trainer.badges}/4`;
  notif.classList.add('show');
  setTimeout(()=>{ notif.classList.remove('show'); if(cb) cb(); }, 2500);
}

function resetGame() {
  document.getElementById('result-overlay').classList.remove('show');
  trainer = { name:'TRAINER', starter:'newton', badges:0, level:1 };
  battle = { route:null, enemyIdx:0, enemy:null, enemyHp:0, playerHp:20, playerMaxHp:20, hints:3, qUsed:{}, currentQ:null, moveType:'attack', canAct:true };
  routes.forEach((r,i)=>{ r.locked = i>0; });
  document.getElementById('trainer-name').value='';
  document.querySelectorAll('.starter-card').forEach(c=>c.classList.remove('selected'));
  show('title-screen');
}
</script>
